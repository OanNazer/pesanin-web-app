<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kantin Mas Broow — Pesan Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <span class="logo-hat">🎓</span>
          <div class="brand-text">
            <span class="brand-kantin">KANTIN</span>
            <span class="brand-name">MAS BROOW</span>
          </div>
        </div>
        <div class="brand-tag">Universitas Pelita Bangsa</div>
      </div>
      <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Keranjang
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      <h1 class="hero-title">Menu <span>Hari Ini</span></h1>
      <p class="hero-sub">Pilih menu favorit kamu, langsung bayar di kasir 🔥</p>
    </div>
    <div class="hero-pattern"></div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="cat-wrap">
    <div class="cat-tabs" id="catTabs"></div>
  </div>

  <!-- MENU GRID -->
  <main class="main-content">
    <div class="menu-section" id="menuSection"></div>
  </main>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Keranjang Pesanan</h2>
      <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>

    <div class="cart-empty" id="cartEmpty">
      <div class="empty-icon">🛒</div>
      <p>Keranjang masih kosong</p>
      <span>Tambah menu dulu yuk!</span>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-subtotal">
        <div class="subtotal-row">
          <span>Subtotal</span>
          <span id="subtotalVal">Rp0</span>
        </div>
        <div class="subtotal-row total">
          <span>Total</span>
          <span id="totalVal">Rp0</span>
        </div>
      </div>
      <div class="cart-note">
        <label>Pickup (opsional)</label>
        <input type="text" id="noteInput" placeholder="Pesanan diambil sekitar 30 menit lagi.." class="note-input">
      </div>
      <button class="btn-order" onclick="konfirmasiOrder()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,11 12,14 22,4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Konfirmasi & Bayar di Kasir
      </button>
      <button class="btn-clear" onclick="clearCart()">Kosongkan Keranjang</button>
    </div>
  </div>

  <!-- ORDER SUMMARY MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-icon">✅</div>
      <h3 class="modal-title">Pesanan Dikonfirmasi!</h3>
      <p class="modal-sub">Tunjukkan ringkasan ini ke kasir</p>
      <div class="modal-receipt" id="modalReceipt"></div>
      <div class="modal-total" id="modalTotal"></div>
      <div class="modal-note-display" id="modalNoteDisplay"></div>
      <button class="btn-modal-close" onclick="closeModal()">Selesai</button>
    </div>
  </div>

  <!-- FLOATING CART SUMMARY (Mobile) -->
  <div class="float-cart" id="floatCart" style="display:none" onclick="toggleCart()">
    <div class="float-left">
      <span class="float-count" id="floatCount">0 item</span>
      <span class="float-total" id="floatTotal">Rp0</span>
    </div>
    <span class="float-cta">Lihat Keranjang →</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
